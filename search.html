<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search - Cheeseball Games</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <button class="hamburger" onclick="toggleMenu()">☰</button>
        <h1 class="logo">🧀 Cheeseball Games</h1>
    </nav>

    <main class="container">
        <a href="index.html" class="back-btn">← Back to Home</a>
        <h2 id="search-title">Search Results</h2>
        <div class="games-grid" id="results"></div>
    </main>

    <footer>
        <p>&copy; 2026 Cheeseball Games. All rights reserved.</p>
    </footer>

    <script>
        // List of all your games
        const games = [
            { name: "Game 1", description: "Your first game", url: "games/game1.html" },
            { name: "Game 2", description: "Your second game", url: "games/game2.html" },
            { name: "Game 3", description: "Your third game", url: "games/game3.html" },
            { name: "Game 4", description: "Your fourth game", url: "games/game4.html" },
            { name: "Game 5", description: "Your fifth game", url: "games/game5.html" },
            { name: "Game 6", description: "Your sixth game", url: "games/game6.html" },
        ];

        // Get search query from URL
        const params = new URLSearchParams(window.location.search);
        const query = params.get('q')?.toLowerCase() || '';

        // Filter games
        const results = games.filter(g =>
            g.name.toLowerCase().includes(query) ||
            g.description.toLowerCase().includes(query)
        );

        // Display results
        document.getElementById('search-title').textContent = `Results for "${query}"`;
        const container = document.getElementById('results');

        if (results.length === 0) {
            container.innerHTML = '<p style="text-align:center; color:#ccc;">No games found 😔</p>';
        } else {
            results.forEach(game => {
                container.innerHTML += `
                    <div class="game-card">
                        <h3>${game.name}</h3>
                        <p>${game.description}</p>
                        <a href="${game.url}" class="btn">Play</a>
                    </div>`;
            });
        }
    </script>
</body>
</html>
